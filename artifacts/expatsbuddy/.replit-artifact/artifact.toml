kind = "web"
previewPath = "/"
title = "ExpatsBuddy Poland"
version = "1.0.0"
id = "artifacts/expatsbuddy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21334

[services.development]
run = "pnpm --filter @workspace/expatsbuddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/expatsbuddy", "run", "build" ]
publicDir = "artifacts/expatsbuddy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21334"
BASE_PATH = "/"
